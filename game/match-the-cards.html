<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mikotomi Maneneko Matsuri - Match the Cards</title>
    <link rel="stylesheet" href="../css/match-the-cards.css">
</head>
<body>
    <a class="back-menu-fixed" href="./index.html" aria-label="Back to game menu">← Back to Menu</a>
    <div class="container">
        <!-- หัวข้อเกม -->
        <header class="header">
            <h1>เกมจับคู่อาหาร</h1>
            <p class="subtitle">จับคู่อาหารให้ตรงกันทั้งหมด</p>
        </header>

        <!-- พื้นที่เล่นเกม -->
        <main class="game-area">
            <div class="cards-grid" id="cardsGrid">
                <!-- ไพ่จะถูกสร้างโดย JavaScript -->
            </div>
            <!-- Progress bar แสดงจำนวนรอบที่เล่น (เล่น 3 รอบได้รางวัล) -->
            <div class="round-progress" id="roundProgress">
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill"></div>
                </div>
                <div class="progress-text" id="progressText">เล่น 0/3 รอบ มีรางวัลให้นะ</div>
            </div>
        </main>

        <!-- Overlay สำหรับแสดง Reward Popup -->
        <div class="overlay" id="overlay"></div>

        <!-- Floating Reward (กระเด้งออกมา) -->
        <div class="floating-reward" id="floatingReward">
            <img src="../assets/cake-reward/flaver.png" alt="Reward">
        </div>

        <!-- Reward Popup -->
        <div class="reward-popup" id="rewardPopup">
            <div class="popup-content">
                <!-- แสดงข้อความรางวัล -->
                <div class="reward-message" id="rewardMessage">
                    <div class="reward-icon"><img src="../assets/cake-reward/flaver.png" alt="Reward"></div>
                    <h2>You got a Reward!</h2>
                </div>

                <button class="btn-ok" id="btnCollectReward">Collect Reward</button>
                <!-- ปุ่ม Play Again และ Back to Menu -->
                <button class="btn-play-again" id="btnPlayAgain">Play Again</button>
                <button class="btn-back-menu" id="btnBackToMenu">Back to Menu</button>
            </div>
        </div>
    </div>

    <script src="../js/audio-manager.js"></script>
    <script src="../js/match-the-cards/script.js"></script>
</body>
</html>
