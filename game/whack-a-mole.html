<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/whack-a-mole.css">
    <title>Mikotomi Maneneko Matsuri - Whack A Mole</title>
</head>
<body>
    <main class="game">
        <div class="header">
            <h1>Whack-a-Mole 🪵</h1>
            <div class="hud">
                <div class="chip">Score: <strong id="score">0</strong></div>
                <div class="chip">Health: <strong id="health">❤️❤️❤️❤️❤️</strong></div>
                <div class="chip">Time: <strong id="time">00:00</strong></div>
                <div class="chip">Best: <strong id="best">0</strong></div>
            </div>
        </div>

        <div class="controls">
            <div class="controls-left">
                <a class="btn back-link" href="./index.html" aria-label="Back to game menu">← Back to Menu</a>
                <button class="btn" id="startBtn" type="button">Start Game</button>
                <!--
                <label for="difficulty" class="sr-only" style="position:absolute;left:-9999px;">Difficulty</label>
                <select id="difficulty" class="select" aria-label="Select difficulty">
                    <option value="easy">Easy</option>
                    <option value="normal" selected>Normal</option>
                    <option value="hard">Hard</option>
                </select>
                -->
            </div>
            <div class="status" id="status">Press Start and bonk the totems!</div>
        </div>

        <section class="board" id="board" aria-label="Whack a mole board"></section>

        <div id="resultOverlay" class="result-overlay" aria-hidden="true">
            <div class="result-card">
                <div id="resultTitle" class="result-title">Reward unlocked!</div>
                <div id="resultScore" class="result-score">Score: 0</div>
                <button id="prizeBtn" class="prize-btn" type="button" aria-label="Collect reward">
                    <img src="../assets/cake-reward/egg.png" alt="Reward">
                    <span>Collect Reward</span>
                </button>
            </div>
        </div>
    </main>

    <script src="../js/audio-manager.js"></script>
    <script src="../js/whack-a-mole/main.js" defer></script>
</body>
</html>
