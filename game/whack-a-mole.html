<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/whack-a-mole.css">
    <title>Mikotomi Maneneko Matsuri - เกมตีตัวตุ่น</title>
</head>
<body>
    <main class="game">
        <div class="header">
            <h1>ตีตัวตุ่น 🪵</h1>
            <div class="hud">
                <div class="chip">คะแนน: <strong id="score">0</strong></div>
                <div class="chip">พลังชีวิต: <strong id="health">❤️❤️❤️❤️❤️</strong></div>
                <div class="chip">เวลา: <strong id="time">00:00</strong></div>
                <div class="chip">สถิติสูงสุด: <strong id="best">0</strong></div>
            </div>
        </div>

        <div class="controls">
            <div class="controls-left">
                <a class="btn back-link" href="./index.html" aria-label="กลับไปเมนูเกม">← กลับเมนูเกม</a>
                <button class="btn" id="startBtn" type="button">เริ่มเกม</button>
                <!--
                <label for="difficulty" class="sr-only" style="position:absolute;left:-9999px;">Difficulty</label>
                <select id="difficulty" class="select" aria-label="Select difficulty">
                    <option value="easy">Easy</option>
                    <option value="normal" selected>Normal</option>
                    <option value="hard">Hard</option>
                </select>
                -->
            </div>
            <div class="status" id="status">กดเริ่มเกมแล้วตีโทเท็มให้ไว!</div>
        </div>

        <section class="board" id="board" aria-label="กระดานเกมตีตัวตุ่น"></section>

        <div id="resultOverlay" class="result-overlay" aria-hidden="true">
            <div class="result-card">
                <div id="resultTitle" class="result-title">ปลดล็อกรางวัลแล้ว!</div>
                <div id="resultScore" class="result-score">คะแนน: 0</div>
                <button id="prizeBtn" class="prize-btn" type="button" aria-label="เก็บรางวัล">
                    <img src="../assets/cake-reward/egg.png" alt="รางวัล">
                    <span>เก็บรางวัล</span>
                </button>
            </div>
        </div>
    </main>

    <script src="../js/audio-manager.js"></script>
    <script src="../js/whack-a-mole/main.js" defer></script>
</body>
</html>
