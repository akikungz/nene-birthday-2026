<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>Shooting Game</title>
<link rel="stylesheet" href="../css/shooting.css">
</head>

<body>

<div id="gameWrapper">
    <div class="shooting-header">
        <a href="./index.html" class="back-menu-btn" aria-label="Back to game menu">← Back to Menu</a>
        <h1>Target Shooting 🎯</h1>

        <div style="flex-grow: 1;"></div>

        <div id="scoreHUD">
            <div class="row">
                <span class="label">คะแนน</span>
                <span id="scoreDisplay" class="value">0</span>
            </div>
            <div class="row">
                <span class="label">เวลา</span>
                <span id="timerDisplay" class="value">02:22</span>
            </div>
            <div class="row">
                <span class="label">High Score</span>
                <span id="highScoreDisplay" class="value">0</span>
            </div>
            <div class="row">
                <span class="label">ชีวิต</span>
                <span id="livesDisplay" class="value lives-value">❤️❤️❤️❤️❤️</span>
            </div>
        </div>
    </div>

    <div id="playZone">
        <div id="gameArea"></div>

        <div id="startScreen" class="screen">
            <div class="screen-card">
                <h2>Target Shooting</h2>
                <button onclick="showTutorial()">เริ่มเกม</button>
            </div>
        </div>

        <div id="tutorialScreen" class="screen" style="display:none;">
            <div class="screen-card">
                <h2>วิธีเล่น</h2>
                <p>ยิงผักเพื่อรับคะแนน</p>
                <p>ยิงอย่างอื่นเสียหัวใจ</p>
                <p>หมดใจ = เกมจบนะจ๊ะ</p>
                <button onclick="beginGame()">เริ่ม!</button>
            </div>
        </div>

        <div id="gameOverScreen" class="screen" style="display:none;">
            <div class="screen-card">
                <h2>Game Over</h2>
                <h3>Score: <span id="finalScore"></span></h3>

                <h3>ประวัติการเล่น</h3>
                <ul id="historyList"></ul>

                <button onclick="startGame()">เล่นอีกครั้ง</button>
            </div>
        </div>

        <div id="resultOverlay" class="result-overlay" aria-hidden="true">
            <div class="result-card">
                <div id="resultTitle" class="result-title">Reward unlocked!</div>
                <div id="resultScore" class="result-score">Score: 0</div>
                <button id="prizeBtn" class="prize-btn" type="button" aria-label="Collect reward">
                    <img src="../assets/cake-reward/milk.png" alt="Reward">
                    <span id="prizeBtnLabel">Collect Reward</span>
                </button>
            </div>
        </div>
    </div>
</div>

<script src="../js/target-shooting/script.js" defer></script>
</body>
</html>
